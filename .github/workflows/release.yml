name: Release Components

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/badgerops/grapheon-backend
  IMAGE_FRONTEND: ghcr.io/badgerops/grapheon-frontend
  IMAGE_AGENT: ghcr.io/badgerops/grapheon-agent

jobs:
  prepare:
    name: Prepare Versions
    runs-on: ubuntu-latest
    outputs:
      backend_version: ${{ steps.versions.outputs.backend_version }}
      frontend_version: ${{ steps.versions.outputs.frontend_version }}
      agent_version: ${{ steps.versions.outputs.agent_version }}
      backend_tag_exists: ${{ steps.tags.outputs.backend_tag_exists }}
      frontend_tag_exists: ${{ steps.tags.outputs.frontend_tag_exists }}
      agent_tag_exists: ${{ steps.tags.outputs.agent_tag_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read versions
        id: versions
        run: |
          echo "backend_version=$(cat backend/VERSION)" >> $GITHUB_OUTPUT
          echo "agent_version=$(cat agent/VERSION)" >> $GITHUB_OUTPUT
          python3 - <<'PY' >> $GITHUB_OUTPUT
          import json
          from pathlib import Path

          version = json.loads(Path("frontend/package.json").read_text(encoding="utf-8"))["version"]
          print(f"frontend_version={version}")
          PY

      - name: Check tags
        id: tags
        run: |
          backend_tag="backend-v${{ steps.versions.outputs.backend_version }}"
          frontend_tag="frontend-v${{ steps.versions.outputs.frontend_version }}"
          agent_tag="agent-v${{ steps.versions.outputs.agent_version }}"

          if git rev-parse "$backend_tag" >/dev/null 2>&1; then
            echo "backend_tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "backend_tag_exists=false" >> $GITHUB_OUTPUT
          fi

          if git rev-parse "$frontend_tag" >/dev/null 2>&1; then
            echo "frontend_tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "frontend_tag_exists=false" >> $GITHUB_OUTPUT
          fi

          if git rev-parse "$agent_tag" >/dev/null 2>&1; then
            echo "agent_tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "agent_tag_exists=false" >> $GITHUB_OUTPUT
          fi

  backend:
    name: Release Backend Image
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.backend_tag_exists == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate versions
        run: python scripts/validate_versions.py

      - name: Extract release notes
        env:
          VERSION: ${{ needs.prepare.outputs.backend_version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          changelog = Path("backend/CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"^##\s+{re.escape(version)}\b.*$"
          match = re.search(pattern, changelog, re.MULTILINE)
          if not match:
            raise SystemExit(f"No changelog entry for {version}")

          start = match.end()
          next_match = re.search(r"^##\s+", changelog[start:], re.MULTILINE)
          end = start + next_match.start() if next_match else len(changelog)
          notes = changelog[start:end].strip()
          if not notes:
            notes = f"Release backend v{version}"

          Path("backend_release_notes.md").write_text(notes, encoding="utf-8")
          PY

      - name: Create and push tag
        env:
          VERSION: ${{ needs.prepare.outputs.backend_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "backend-v$VERSION" -m "Backend v$VERSION"
          git push origin "backend-v$VERSION"

      - name: Create GitHub release
        uses: actions/github-script@v7
        env:
          VERSION: ${{ needs.prepare.outputs.backend_version }}
        with:
          script: |
            const fs = require('fs');
            const notes = fs.readFileSync('backend_release_notes.md', 'utf8');

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `backend-v${process.env.VERSION}`,
              name: `backend-v${process.env.VERSION}`,
              body: notes,
              draft: false,
              prerelease: false
            });

            console.log(`Created release: ${release.data.html_url}`);

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        env:
          VERSION: ${{ needs.prepare.outputs.backend_version }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:v${{ env.VERSION }}

  frontend:
    name: Release Frontend Image
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.frontend_tag_exists == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate versions
        run: python scripts/validate_versions.py

      - name: Extract release notes
        env:
          VERSION: ${{ needs.prepare.outputs.frontend_version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          changelog = Path("frontend/CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"^##\s+{re.escape(version)}\b.*$"
          match = re.search(pattern, changelog, re.MULTILINE)
          if not match:
            raise SystemExit(f"No changelog entry for {version}")

          start = match.end()
          next_match = re.search(r"^##\s+", changelog[start:], re.MULTILINE)
          end = start + next_match.start() if next_match else len(changelog)
          notes = changelog[start:end].strip()
          if not notes:
            notes = f"Release frontend v{version}"

          Path("frontend_release_notes.md").write_text(notes, encoding="utf-8")
          PY

      - name: Create and push tag
        env:
          VERSION: ${{ needs.prepare.outputs.frontend_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "frontend-v$VERSION" -m "Frontend v$VERSION"
          git push origin "frontend-v$VERSION"

      - name: Create GitHub release
        uses: actions/github-script@v7
        env:
          VERSION: ${{ needs.prepare.outputs.frontend_version }}
        with:
          script: |
            const fs = require('fs');
            const notes = fs.readFileSync('frontend_release_notes.md', 'utf8');

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `frontend-v${process.env.VERSION}`,
              name: `frontend-v${process.env.VERSION}`,
              body: notes,
              draft: false,
              prerelease: false
            });

            console.log(`Created release: ${release.data.html_url}`);

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        env:
          VERSION: ${{ needs.prepare.outputs.frontend_version }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:v${{ env.VERSION }}

  agent:
    name: Release Agent Artifact and Image
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.agent_tag_exists == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate versions
        run: python scripts/validate_versions.py

      - name: Extract release notes
        env:
          VERSION: ${{ needs.prepare.outputs.agent_version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          changelog = Path("agent/CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"^##\s+{re.escape(version)}\b.*$"
          match = re.search(pattern, changelog, re.MULTILINE)
          if not match:
            raise SystemExit(f"No changelog entry for {version}")

          start = match.end()
          next_match = re.search(r"^##\s+", changelog[start:], re.MULTILINE)
          end = start + next_match.start() if next_match else len(changelog)
          notes = changelog[start:end].strip()
          if not notes:
            notes = f"Release agent v{version}"

          Path("agent_release_notes.md").write_text(notes, encoding="utf-8")
          PY

      - name: Create and push tag
        env:
          VERSION: ${{ needs.prepare.outputs.agent_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "agent-v$VERSION" -m "Agent v$VERSION"
          git push origin "agent-v$VERSION"

      - name: Create GitHub release
        uses: actions/github-script@v7
        env:
          VERSION: ${{ needs.prepare.outputs.agent_version }}
        with:
          script: |
            const fs = require('fs');
            const notes = fs.readFileSync('agent_release_notes.md', 'utf8');

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `agent-v${process.env.VERSION}`,
              name: `agent-v${process.env.VERSION}`,
              body: notes,
              draft: false,
              prerelease: false
            });

            console.log(`Created release: ${release.data.html_url}`);

      - name: Build agent release artifact
        env:
          VERSION: ${{ needs.prepare.outputs.agent_version }}
        run: |
          bash scripts/build-agent-artifact.sh "$VERSION" "dist/grapheon-agent-v$VERSION.tar.gz"

      - name: Upload agent artifact to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.agent_version }}
        run: |
          gh release upload "agent-v$VERSION" "dist/grapheon-agent-v$VERSION.tar.gz#grapheon-agent-v$VERSION.tar.gz" --clobber

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent image
        env:
          VERSION: ${{ needs.prepare.outputs.agent_version }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: agent/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_AGENT }}:latest
            ${{ env.IMAGE_AGENT }}:v${{ env.VERSION }}
